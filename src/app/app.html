<div class="app-container">
  <div class="app-header-shell">
    <div class="app-header">
      <div class="brand-block" role="button" tabindex="0" (click)="goHome()" (keyup.enter)="goHome()">
        <img src="/ayrash-logo.png" alt="AyRaSh Logo" class="brand-mark">
        <div class="brand-copy">
          <strong>AyRaSh</strong>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="header-action" (click)="openFaq()" aria-label="Open AyRaSh FAQ">
          <span class="header-icon">❓</span>
          <span>FAQ</span>
        </button>
        <button type="button" class="header-action chat" (click)="openChat()" aria-label="Open AyRaSh chat support">
          <span class="header-icon">💬</span>
          <span>Ask AyRaSh</span>
        </button>
      </div>
    </div>
  </div>

  <div class="app-wrapper">
    <router-outlet></router-outlet>
  </div>
</div>
